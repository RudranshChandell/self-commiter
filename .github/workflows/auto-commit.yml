name: Daily Auto Commit

on:
  schedule:
    # This cron expression runs the job every day at 12:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Make a change to a log file
      run: |
        echo "Last automated check-in: $(date)" > daily_log.txt

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user-email "41898282+github-actions[bot]@users.noreply.github.com"
        git add daily_log.txt
        git commit -m "chore: automated daily contribution update"
        git push
