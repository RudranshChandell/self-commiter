name: Daily Auto Commit

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Using >> appends a new line every day so the file always changes
    - name: Make a change to a log file
      run: |
        echo "Automated check-in: $(date)" >> daily_log.txt

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user-email "41898282+github-actions[bot]@users.noreply.github.com"
        git add daily_log.txt
        # The internal check ensures it won't crash if there's nothing new
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: automated daily contribution update" && git push)
