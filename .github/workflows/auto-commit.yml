name: Daily Auto Commit

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Make a change to a log file
      run: |
        echo "Automated check-in: $(date)" >> daily_log.txt

    - name: Commit and Push changes
      run: |
        git config --global user.name "Rudransh Chandel"
        # Use your verified GitHub email address here instead of the bot email
        git config --global user.email "rudranshchandel123@gmail.com"
        git add daily_log.txt
        git commit -m "chore: automated daily contribution update"
        git push origin main
